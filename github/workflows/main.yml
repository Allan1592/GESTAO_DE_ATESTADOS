name: Gerar Executável Windows
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Instalar Dependências e Build
        run: |
          npm install
          npm run build
          
      - name: Empacotar com NW.js
        run: |
          # Aqui o robô junta o seu código com o Globo Azul (NW.js)
          npx nwjs-builder-phoenix --tasks win-x64 --targets win-x64 .
          
      - name: Upload do Resultado
        uses: actions/upload-artifact@v3
        with:
          name: Sistema-Atestados-V2
          path: dist/
