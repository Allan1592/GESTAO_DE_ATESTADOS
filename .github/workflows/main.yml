name: Gerar Executável Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build do sistema
        run: npm run build

      - name: Empacotar EXE
        run: npx nwjs-builder-phoenix --tasks win-x64 --targets win-x64 dist

      - name: Enviar executável
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Atestados
          path: dist
