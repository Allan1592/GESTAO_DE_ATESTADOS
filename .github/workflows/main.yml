name: Gerar Executável Windows
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Limpar Cache e Instalar
        run: |
          npm cache clean --force
          npm install
          
      - name: Build
        run: npm run build
          
      - name: Empacotar
        run: |
          npx nwjs-builder-phoenix --tasks win-x64 --targets win-x64 .
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Atestados-V2
          path: dist/
