name: Gerar Executável Windows
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar Dependencias
        run: |
          npm install
          
      - name: Build do Projeto
        run: npm run build
          
      - name: Empacotar com NW.js
        run: |
          npx nwjs-builder-phoenix --tasks win-x64 --targets win-x64 .
          
      - name: Upload do Resultado
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Atestados-V2
          path: dist/
