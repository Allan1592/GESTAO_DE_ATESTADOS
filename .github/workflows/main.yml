name: Gerar Executável
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run build
      - run: npx electron-builder --win portable
      - uses: actions/upload-artifact@v4
        with:
          name: Sistema-Atestados-EXE
          path: dist/*.exe
